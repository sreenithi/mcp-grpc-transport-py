name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync

    - name: Run all tests
      run: uv run python -m unittest discover -s tests

    # TODO: Remove this step once it is rewritten using absltest.parameterize
    - name: Run `e2e_call_tool_rpc` test using pytest
      run: uv run python -m pytest tests/test_e2e_call_tool_rpc_pytest.py
